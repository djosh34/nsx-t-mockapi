name: Docker

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          pull: true
          tags: nsx-t-mockapi:ci
          cache-from: type=gha,scope=nsx-t-mockapi
          cache-to: type=gha,mode=max,scope=nsx-t-mockapi

      - name: Save image
        run: docker save nsx-t-mockapi:ci -o nsx-t-mockapi.tar

      - name: Upload image
        uses: actions/upload-artifact@v7
        with:
          name: nsx-t-mockapi-image
          path: nsx-t-mockapi.tar
          retention-days: 1

  test:
    name: Build and Run Dockerfile.test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.test
          load: true
          pull: true
          tags: nsx-t-mockapi:test
          cache-from: type=gha,scope=nsx-t-mockapi-test
          cache-to: type=gha,mode=max,scope=nsx-t-mockapi-test

      - name: Run test image
        run: docker run --rm --network none nsx-t-mockapi:test

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
      - build
      - test
    if: github.event_name == 'push'
    steps:
      - name: Download image
        uses: actions/download-artifact@v8
        with:
          name: nsx-t-mockapi-image

      - name: Load image
        run: docker load -i nsx-t-mockapi.tar

      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -eu

          image="ghcr.io/$(printf '%s' "${REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          docker tag nsx-t-mockapi:ci "${image}:${SHA}"
          docker push "${image}:${SHA}"

          if [ "${REF_NAME}" = "${DEFAULT_BRANCH}" ]; then
            docker tag nsx-t-mockapi:ci "${image}:latest"
            docker push "${image}:latest"
          fi
